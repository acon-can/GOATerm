name: ClaudeTerm
options:
  bundleIdPrefix: com.claudeterm
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

targets:
  ClaudeTerm:
    type: application
    platform: macOS
    sources:
      - path: ClaudeTerm
        excludes:
          - "Shell/**"
          - "Resources/**"
    resources:
      - path: ClaudeTerm/Shell/claudeterm-integration.zsh
      - path: ClaudeTerm/Resources/Assets.xcassets
    dependencies:
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeterm.app
        PRODUCT_NAME: Goat
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: ClaudeTerm/ClaudeTerm.entitlements
        INFOPLIST_FILE: ClaudeTerm/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: "NO"
        COMBINE_HIDPI_IMAGES: "YES"
    entitlements:
      path: ClaudeTerm/ClaudeTerm.entitlements
      properties:
        com.apple.security.app-sandbox: false

  ClaudeTermTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeTermTests
    dependencies:
      - target: ClaudeTerm
    settings:
      base:
        SWIFT_VERSION: "5.9"
